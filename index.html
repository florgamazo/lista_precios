<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lista de Precios Mayorista</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;900&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg: #0d0f14;
    --surface: #161920;
    --surface2: #1e2230;
    --border: #2a2f3e;
    --accent: #e8c14a;
    --accent2: #f0d070;
    --text: #e8eaf0;
    --text2: #8890a8;
    --text3: #555d78;
    --peugeot: #00b4d8;
    --chevrolet: #f4a261;
    --volkswagen: #a8dadc;
    --red: #e06c75;
    --radius: 10px;
    --font: 'Barlow', sans-serif;
    --font-cond: 'Barlow Condensed', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* === HEADER === */
  .header {
    background: linear-gradient(135deg, #0d0f14 0%, #161e2e 60%, #1a1408 100%);
    border-bottom: 2px solid var(--accent);
    padding: 28px 40px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .header-left {}

  .brand-tag {
    font-family: var(--font-cond);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .header h1 {
    font-family: var(--font-cond);
    font-size: 36px;
    font-weight: 900;
    letter-spacing: 1px;
    color: var(--text);
    line-height: 1;
  }

  .header h1 span { color: var(--accent); }

  .iva-notice {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: rgba(232,193,74,0.1);
    border: 1px solid rgba(232,193,74,0.3);
    border-radius: 6px;
    padding: 7px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.5px;
    margin-top: 10px;
  }

  .iva-notice::before {
    content: "⚠";
    font-size: 13px;
  }

  .header-right {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .btn {
    font-family: var(--font);
    font-size: 13px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 7px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.18s ease;
    letter-spacing: 0.3px;
    white-space: nowrap;
  }

  .btn-pdf {
    background: var(--red);
    color: #fff;
  }
  .btn-pdf:hover { background: #c8535d; transform: translateY(-1px); }

  .btn-xls {
    background: #3a7d44;
    color: #fff;
  }
  .btn-xls:hover { background: #2e6336; transform: translateY(-1px); }

  /* === CONTROLS === */
  .controls {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 40px;
    display: flex;
    gap: 16px;
    align-items: center;
    flex-wrap: wrap;
  }

  .search-wrapper {
    position: relative;
    flex: 1;
    min-width: 220px;
    max-width: 420px;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 15px;
    pointer-events: none;
  }

  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    padding: 11px 14px 11px 40px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }

  .brands-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .brand-btn {
    font-family: var(--font-cond);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    padding: 9px 18px;
    border-radius: 7px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text2);
    cursor: pointer;
    transition: all 0.18s ease;
  }

  .brand-btn:hover { border-color: var(--text2); color: var(--text); }

  .brand-btn.active[data-brand="all"] {
    background: var(--accent);
    border-color: var(--accent);
    color: #0d0f14;
  }
  .brand-btn.active[data-brand="peugeot"] {
    background: var(--peugeot);
    border-color: var(--peugeot);
    color: #0d0f14;
  }
  .brand-btn.active[data-brand="chevrolet"] {
    background: var(--chevrolet);
    border-color: var(--chevrolet);
    color: #0d0f14;
  }
  .brand-btn.active[data-brand="volkswagen"] {
    background: var(--volkswagen);
    border-color: var(--volkswagen);
    color: #0d0f14;
  }

  .results-info {
    margin-left: auto;
    font-size: 13px;
    color: var(--text2);
    white-space: nowrap;
  }

  .results-info strong { color: var(--accent); }

  /* === TABLE === */
  .table-wrapper {
    padding: 24px 40px 48px;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  thead th {
    font-family: var(--font-cond);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 2;
  }

  thead th.right { text-align: right; }

  tbody tr {
    border-bottom: 1px solid rgba(42,47,62,0.6);
    transition: background 0.12s;
  }

  tbody tr:hover { background: rgba(232,193,74,0.04); }

  td {
    padding: 13px 16px;
    vertical-align: middle;
  }

  .td-code {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    color: var(--text2);
    white-space: nowrap;
  }

  .td-desc {
    font-weight: 500;
    color: var(--text);
    max-width: 340px;
  }

  .td-brand {
    white-space: nowrap;
  }

  .badge {
    display: inline-block;
    font-family: var(--font-cond);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 4px;
    color: #0d0f14;
  }

  .badge-peugeot { background: var(--peugeot); }
  .badge-chevrolet { background: var(--chevrolet); }
  .badge-volkswagen { background: var(--volkswagen); }

  .td-pvp, .td-may {
    text-align: right;
    white-space: nowrap;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
  }

  .td-pvp { color: var(--text2); }

  .td-may {
    color: var(--accent2);
    font-size: 15px;
  }

  /* === EMPTY STATE === */
  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text3);
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
  .empty-state p { font-size: 16px; }

  /* === PRINT / PDF STYLES === */
  @media print {
    body { background: #fff; color: #111; }
    .controls, .header-right, .brand-btn { display: none !important; }
    .header {
      background: #fff;
      border-bottom: 3px solid #111;
      color: #111;
    }
    .header h1, .brand-tag { color: #111; }
    .header h1 span { color: #c9a03a; }
    .iva-notice { background: #fffbea; border-color: #c9a03a; color: #7a5f00; }
    .table-wrapper { padding: 16px 0; }
    table { font-size: 11px; }
    thead th { background: #f0f0f0; color: #444; border-bottom: 2px solid #999; }
    tbody tr { border-bottom: 1px solid #ddd; }
    tbody tr:hover { background: none; }
    .td-code { color: #555; }
    .td-desc { color: #111; }
    .badge-peugeot { background: #00b4d8; }
    .badge-chevrolet { background: #f4a261; }
    .badge-volkswagen { background: #a8dadc; }
    .td-pvp { color: #555; }
    .td-may { color: #8a6a00; font-size: 12px; }
    .results-info { display: none; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="brand-tag">Lista de precios — Mayoristas</div>
    <h1>REPUESTOS <span>ORIGINALES</span></h1>
    <div class="iva-notice">PRECIOS NO INCLUYEN IVA</div>
  </div>
  <div class="header-right">
    <button class="btn btn-pdf" onclick="exportPDF()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="15" y2="17"/><polyline points="9 9 10 9 9 9"/></svg>

    <button class="btn btn-xls" onclick="exportXLS()">

      Exportar Excel
    </button>
  </div>
</div>

<div class="controls">
  <div class="search-wrapper">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchInput" placeholder="Buscar por código o descripción..." oninput="applyFilters()">
  </div>

  <div class="brands-row">
    <button class="brand-btn active" data-brand="all" onclick="selectBrand('all')">TODAS</button>
    <button class="brand-btn" data-brand="peugeot" onclick="selectBrand('peugeot')">Peugeot / Citroën</button>
    <button class="brand-btn" data-brand="chevrolet" onclick="selectBrand('chevrolet')">Chevrolet</button>
    <button class="brand-btn" data-brand="volkswagen" onclick="selectBrand('volkswagen')">Volkswagen</button>
  </div>

  <div class="results-info" id="resultsInfo">
    Mostrando <strong id="countVisible">0</strong> artículos
  </div>
</div>

<div class="table-wrapper">
  <table id="mainTable">
    <thead>
      <tr>
        <th>Código</th>
        <th>Descripción</th>
        <th>Marca</th>
        <th class="right">PVP</th>
        <th class="right">Precio Mayorista</th>
      </tr>
    </thead>
    <tbody id="tableBody">
    </tbody>
  </table>
  <div id="emptyState" class="empty-state" style="display:none">
    <div class="icon">🔎</div>
    <p>No se encontraron artículos con los filtros aplicados.</p>
  </div>
</div>

let currentBrand = 'all';
let currentSearch = '';

function fmt(n) {
  return '$ ' + n.toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function brandLabel(m) {
  if (m === 'peugeot') return 'Peugeot / Citroën';
  if (m === 'chevrolet') return 'Chevrolet';
  if (m === 'volkswagen') return 'Volkswagen';
  return m;
}

function getFiltered() {
  const q = currentSearch.trim().toLowerCase();
  return PRODUCTOS.filter(p => {
    const brandOk = currentBrand === 'all' || p.marca === currentBrand;
    const searchOk = !q || p.codigo.toLowerCase().includes(q) || p.descripcion.toLowerCase().includes(q);
    return brandOk && searchOk;
  });
}

function renderTable() {
  const data = getFiltered();
  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');
  const table = document.getElementById('mainTable');

  document.getElementById('countVisible').textContent = data.length;

  if (data.length === 0) {
    tbody.innerHTML = '';
    table.style.display = 'none';
    empty.style.display = 'block';
    return;
  }

  table.style.display = '';
  empty.style.display = 'none';

  tbody.innerHTML = data.map(p => `
    <tr>
      <td class="td-code">${p.codigo}</td>
      <td class="td-desc">${p.descripcion}</td>
      <td class="td-brand"><span class="badge badge-${p.marca}">${brandLabel(p.marca)}</span></td>
      <td class="td-pvp">${fmt(p.pvp)}</td>
      <td class="td-may">${fmt(p.mayorista)}</td>
    </tr>
  `).join('');
}

function selectBrand(b) {
  currentBrand = b;
  document.querySelectorAll('.brand-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.brand === b);
  });
  renderTable();
}

function applyFilters() {
  currentSearch = document.getElementById('searchInput').value;
  renderTable();
}

function exportPDF() {
  window.print();
}

function exportXLS() {
  const data = getFiltered();
  if (!data.length) { alert('No hay datos para exportar con los filtros actuales.'); return; }

  const wb = XLSX.utils.book_new();

  const rows = [
    ['LISTA DE PRECIOS MAYORISTA'],
    ['PRECIOS NO INCLUYEN IVA'],
    [],
    ['CODIGO', 'DESCRIPCION', 'MARCA', 'PVP', 'PRECIO MAYORISTA']
  ];

  data.forEach(p => {
    rows.push([p.codigo, p.descripcion, brandLabel(p.marca), p.pvp, p.mayorista]);
  });

  const ws = XLSX.utils.aoa_to_sheet(rows);

  // Column widths
  ws['!cols'] = [
    { wch: 26 }, { wch: 42 }, { wch: 20 }, { wch: 16 }, { wch: 18 }
  ];

  XLSX.utils.book_append_sheet(wb, ws, 'Lista Precios');

  const brandName = currentBrand === 'all' ? 'Todas' : brandLabel(currentBrand).replace(' / ', '_');
  const fecha = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `ListaPrecios_${brandName}_${fecha}.xlsx`);
}

// Init
renderTable();
